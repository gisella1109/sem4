name: glucoguide
description: Aplikasi Food Log untuk pasien diabetes
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.3.3
  image_picker: ^1.0.7
  flutter_dotenv: ^5.1.0
  uuid: ^4.4.0
  intl: ^0.19.0
  provider: ^6.1.2
  http: ^1.1.0
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/env/.env
    - assets/images/logo_foodlog.png